<!DOCTYPE html>
<html>
<head>
    <title>Stock 3 Dispatch</title>
    <link rel="stylesheet" href="css/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body class="dispatch-page">
<div class="page">

<h2 class="page-heading">🚚 Stock 3 Dispatch Entry</h2>

<div class="date-box">
<label>Select Date:</label>
<input type="date" id="transactionDate">
</div>

<input type="text" id="party" placeholder="Party Name">
<input type="text" id="invoice" placeholder="Invoice Number">
<textarea id="note" placeholder="Note"></textarea>

<button onclick="addRow()" class="insert-row-btn">➕ Insert Row</button>

<table id="itemTable">
<thead>
<tr>
<th>Code</th>
<th>Name</th>
<th>Loose Code</th>
<th>Bags</th>
<th>Quantity</th>
<th>Total Quantity</th>
</tr>
</thead>

<tbody></tbody>

<tfoot>
<tr>
<td colspan="3"><b>TOTAL</b></td>
<td id="totalBags">0</td>
<td></td>
<td id="grandTotalQty">0</td>
</tr>
</tfoot>
</table>

<button onclick="saveTransaction()" class="done-btn">✅ DONE</button>

<!-- ✅ ALL SUGGESTION LIST -->
<datalist id="codeList"></datalist>
<datalist id="nameList"></datalist>
<datalist id="looseList"></datalist>

</div>

<script src="js/app.js"></script>
</body>
</html>
