<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock ERP Dashboard</title>

<style>
body{
    margin:0;
    font-family:Segoe UI,Arial;
    background:radial-gradient(circle at top left,#1f2a44,#0f172a);
    color:white;
}

/* TOPBAR */
.topbar{
    height:55px;
    background:#111827;
    display:flex;
    align-items:center;
    padding:0 15px;
}
.menu-btn{
    font-size:22px;
    cursor:pointer;
    margin-right:15px;
}
.topbar h3{
    flex:1;
}

/* SIDEBAR */
.container{
    display:flex;
}
.sidebar{
    width:230px;
    background:#111827;
    min-height:100vh;
    padding:20px;
    transition:0.3s;
}
.sidebar.hide{
    margin-left:-230px;
}
.sidebar h3{
    margin-bottom:25px;
}
.sidebar button{
    width:100%;
    padding:10px;
    margin:6px 0;
    border:none;
    background:#374151;
    color:white;
    cursor:pointer;
    border-radius:6px;
    font-size:14px;
    text-align:left;
}
.sidebar button:hover{
    background:#4b5563;
}
.submenu{
    display:none;
    padding-left:12px;
}

/* MAIN */
.main{
    flex:1;
    padding:25px;
}

/* SUMMARY CARDS */
.summary{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
    margin-bottom:20px;
}
.summary-card{
    background:#111827;
    padding:20px;
    border-radius:10px;
    text-align:center;
}
.summary-card h4{
    margin:0;
    font-weight:400;
}
.summary-card h2{
    margin:10px 0;
}

/* SEARCH & BUTTON */
.top-bar-controls{
    display:flex;
    justify-content:space-between;
    margin-bottom:15px;
}
.top-bar-controls input{
    padding:8px;
    width:250px;
    border:1px solid #ccc;
    border-radius:5px;
}
.top-bar-controls button{
    padding:8px 12px;
    border:none;
    background:#28a745;
    color:white;
    border-radius:5px;
    cursor:pointer;
}
.top-bar-controls button:hover{
    background:#1e7e34;
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
    background:white;
    color:black;
    margin-top:20px;
}
th, td{
    padding:10px;
    border:1px solid #ddd;
    text-align:center;
}
th{
    background:#333;
    color:white;
    cursor:pointer;
}
tr:hover{
    background:#f1f1f1;
}
.stock{
    font-weight:bold;
    background:#e6f7ff;
    color:#007bff;
}
.positive{ color:green; font-weight:bold; }
.negative{ color:red; font-weight:bold; }

/* LOGOUT CONFIRM */
.logoutBtn{
    padding:8px 16px;
    background:#dc2626;
    border:none;
    color:white;
    border-radius:6px;
    cursor:pointer;
    font-weight:600;
    transition:.3s;
}
.logoutBtn:hover{
    background:#b91c1c;
    transform:scale(1.05);
}
.confirm-overlay{
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.6);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
}
.confirm-box{
    background:#1f2937;
    padding:25px;
    border-radius:10px;
    text-align:center;
    width:300px;
    color:white;
    animation:fadePop .3s ease;
}
.confirm-box h3{margin-bottom:10px;}
.confirm-box p{margin-bottom:20px; color:#ccc;}
.confirm-buttons{display:flex; justify-content:center; gap:10px;}
.cancelBtn, .confirmBtn{
    padding:8px 16px; border:none; border-radius:6px; cursor:pointer;
}
.cancelBtn{background:#6b7280; color:white;}
.confirmBtn{background:#ef4444; color:white;}
@keyframes fadePop{from{opacity:0;transform:scale(.8);} to{opacity:1;transform:scale(1);}}
</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
    <span class="menu-btn" onclick="toggleMenu()">☰</span>
    <h3>Stock ERP Dashboard</h3>
    <button onclick="openLogoutConfirm()" class="logoutBtn">Logout</button>
</div>

<div class="container">
    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
        <h3>Stock ERP</h3>
        <button onclick="openPage('dashboard.html')">Dashboard</button>
        <button onclick="toggleStockMenu()">Stock Entry▼</button>
        <div id="stockMenu" class="submenu">
            <button onclick="openPage('stock1.html')">BK TO PACO (OUT)</button>
            <button onclick="openPage('stock2.html')">PACO TO BK (IN)</button>
            <button onclick="openPage('stock3.html')">CTC TO BK (IN)</button>
            <button onclick="openPage('stock4.html')">SKYZONE TO BK(IN)</button>
        </div>
        <button onclick="openPage('products.html')">Products</button>
        <button onclick="openPage('stock-report.html')">Stock Report</button>
        <button onclick="toggleDownloadMenu()">Download ▼</button>
        <div id="downloadMenu" class="submenu">
            <button onclick="downloadStock('stock1')">Download BK TO PACO (OUT)</button>
            <button onclick="downloadStock('stock2')">Download PACO TO BK (IN)</button>
            <button onclick="downloadStock('stock3')">Download CTC TO BK (IN)</button>
            <button onclick="downloadStock('stock4')">Download SKYZONE TO BK (IN)</button>
        </div>
    </div>

    <!-- MAIN -->
    <div class="main">
        <h2>Dashboard</h2>

        <!-- SUMMARY CARDS -->
        <div class="summary">
            <div class="summary-card"><h4>Total Stock1</h4><h2 id="s1">0</h2></div>
            <div class="summary-card"><h4>Total Stock2</h4><h2 id="s2">0</h2></div>
            <div class="summary-card"><h4>Difference</h4><h2 id="diff">0</h2></div>
        </div>

        <!-- BUTTON TO OPEN COMBINED STOCK TABLE -->
        <div style="margin-bottom:15px;">
            <button onclick="showCombinedTable()" style="padding:10px 15px; background:#2563eb; color:white; border:none; border-radius:6px; cursor:pointer;">Open Combined Stock Table</button>
        </div>

        <!-- SEARCH & CSV -->
        <div class="top-bar-controls">
            <input type="text" id="search" placeholder="Search by Code / Name / Loose Code">
            <button onclick="downloadCSV()">Download CSV</button>
        </div>

        <!-- STOCK TABLE -->
        <table>
            <thead>
                <tr>
                    <th>Code</th>
                    <th>Name</th>
                    <th>Stock1</th>
                    <th>Stock2</th>
                    <th>Difference</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="5" class="loading">Loading...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- LOGOUT POPUP -->
<div id="logoutConfirmBox" class="confirm-overlay">
    <div class="confirm-box">
        <h3>Confirm Logout</h3>
        <p>Are you sure?</p>
        <div class="confirm-buttons">
            <button class="cancelBtn" onclick="closeLogoutConfirm()">Cancel</button>
            <button class="confirmBtn" onclick="logout()">Logout</button>
        </div>
    </div>
</div>

<script>
/* ===== MENU TOGGLING ===== */
function toggleMenu(){document.getElementById("sidebar").classList.toggle("hide")}
function toggleStockMenu(){let m=document.getElementById("stockMenu");m.style.display=m.style.display==="block"?"none":"block"}
function toggleDownloadMenu(){let m=document.getElementById("downloadMenu");m.style.display=m.style.display==="block"?"none":"block"}
function openPage(p){window.location=p}
function openLogoutConfirm(){document.getElementById("logoutConfirmBox").style.display="flex"}
function closeLogoutConfirm(){document.getElementById("logoutConfirmBox").style.display="none"}
function logout(){window.location="index.html"}

/* ===== DASHBOARD DATA ===== */
const BASE_URL="http://localhost:3000";
let stockData=[], sortAsc=true;

/* Load combined stock data by merging Stock1 and Stock2 */
async function showCombinedTable(){
    try{
        const res = await fetch(`${BASE_URL}/combined-stock`);

        const data = await res.json();

        // 🔥 SAFE CHECK (error fix)
        if(!Array.isArray(data)){
            console.error("Invalid data:", data);
            return;
        }

        stockData = data;

        renderTable(stockData);
        updateCards(stockData);

    }catch(err){
        console.log("🔥 Dashboard Error:", err);
    }
}

/* ===== RENDER TABLE ===== */
function renderTable(data){
    const tbody=document.getElementById("tableBody");
    tbody.innerHTML="";
    data.forEach(i=>{
        const diffClass = i.difference >0?"positive":i.difference<0?"negative":"";
        const row=`<tr>
            <td>${i.code||""}</td>
            <td>${i.name||""}</td>
            <td>${i.stock1||0}</td>
            <td>${i.stock2||0}</td>
            <td class="${diffClass}">${i.difference||0}</td>
        </tr>`;
        tbody.innerHTML+=row;
    });
}

/* ===== UPDATE CARDS ===== */
function updateCards(data){
    let s1=0,s2=0;
    data.forEach(i=>{s1+=i.stock1; s2+=i.stock2;});
    document.getElementById("s1").innerText=s1;
    document.getElementById("s2").innerText=s2;
    document.getElementById("diff").innerText=s1-s2;
}

/* ===== SEARCH ===== */
document.getElementById("search").addEventListener("input", function(){
    const val=this.value.toLowerCase();
    const filtered=stockData.filter(i=>
        (i.code && i.code.toLowerCase().includes(val)) ||
        (i.name && i.name.toLowerCase().includes(val))
    );
    renderTable(filtered);
    updateCards(filtered);
});

/* ===== SORT ===== */
function sortTable(key){
    sortAsc = !sortAsc;
    const sorted=[...stockData].sort((a,b)=>{
        if(typeof a[key]==="number") return sortAsc?a[key]-b[key]:b[key]-a[key];
        return sortAsc?String(a[key]).localeCompare(String(b[key])):String(b[key]).localeCompare(String(a[key]));
    });
    renderTable(sorted);
}

/* ===== CSV DOWNLOAD ===== */
function downloadCSV(){
    let csv="Code,Name,Stock1,Stock2,Difference\n";
    stockData.forEach(i=>{
        csv+=`${i.code},${i.name},${i.stock1},${i.stock2},${i.difference}\n`;
    });
    const blob=new Blob([csv],{type:"text/csv"});
    const url=window.URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;
    a.download="combined_stock.csv";
    a.click();
    window.URL.revokeObjectURL(url);
}

/* AUTO REFRESH */
setInterval(showCombinedTable,5000);
showCombinedTable();
</script>

</body>
</html>
