<!DOCTYPE html>
<html>
<head>
    <title id="stock2PageTitle">PACO TO BK (IN)</title>
    <link rel="stylesheet" href="css/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body id="stock2Page" class="stock-page stock2-page">

<div class="page stock-container" id="stock2Container">

<h2 id="stock2Heading" class="stock-heading">📦 PACO TO BK (IN)</h2>

<div class="options stock-options" id="stock2Options">

<!-- ✅ DISPATCH -->
<button 
    class="dispatchBtn dispatch-btn stock-dispatch-btn" 
    id="stock2DispatchBtn" 
    onclick="openDispatch()">
    🚚 Dispatch Entry
</button>

<!-- ✅ RECEIVE -->
<button 
    class="receiveBtn receive-btn stock-receive-btn" 
    id="stock2ReceiveBtn" 
    onclick="openReceive()">
    📥 Receive Entry
</button>

</div>

<br>

<button 
    class="backBtn back-btn stock-back-btn" 
    id="stock2BackBtn" 
    onclick="goHome()">
    ⬅ Back
</button>

</div>

<script>

/* ================= SET STOCK ================= */
localStorage.setItem("stock","stock2");

/* ================= NAVIGATION ================= */
function openDispatch(){
    localStorage.setItem("type","dispatch");
    window.location.href="stock2-dispatch.html";
}

function openReceive(){
    localStorage.setItem("type","receive");
    window.location.href="stock2-receive.html";
}

function goHome(){
    window.location.href="dashboard.html";
}

</script>

</body>
</html>
